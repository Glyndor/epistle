name: Benchmarks

# Compile the criterion benchmarks on every change so they never bit-rot
# (a deterministic gate — no timing in CI), and offer an on-demand full run
# that publishes the criterion report as an artifact for manual regression
# tracking. We keep timing comparisons off the PR gate because runner timing
# is too noisy to fail a build on.
on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    name: Compile benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target
          key: cargo-bench-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build benchmarks
        run: cargo bench --no-run --locked

  run:
    name: Run benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target
          key: cargo-bench-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench --locked

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: criterion-report
          path: target/criterion/
          if-no-files-found: warn
