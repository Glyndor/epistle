name: Rust audit

on:
  schedule:
    # Weekly, Monday 06:00 UTC: catch new RUSTSEC advisories on a fixed tree.
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"

permissions:
  contents: read

jobs:
  audit:
    uses: Glyndor/.github/.github/workflows/rust-audit.yml@f72a52755c737ad4ae0a61e56ac43e2edc7280c5 # v1.1.0
