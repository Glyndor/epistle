name: Rust audit

on:
  schedule:
    # Weekly, Monday 06:00 UTC: catch new RUSTSEC advisories on a fixed tree.
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"

permissions:
  contents: read

jobs:
  audit:
    uses: Glyndor/.github/.github/workflows/rust-audit.yml@80523422631014f591b07bc24c507145faabb271 # v1.2.0
