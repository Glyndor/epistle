name: Database

on:
  push:
    branches: [develop, main]
  pull_request:
    paths:
      - "migrations/**"
      - "src/db/**"
      - "tests/database.rs"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

jobs:
  db-tests:
    name: integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/mail_test
      # Compile the sqlx query! macros against the committed .sqlx cache; the
      # service database is migrated at runtime by the tests themselves, so a
      # live compile-time check would race the (not-yet-applied) schema.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run database integration tests
        run: cargo test --locked --test database
